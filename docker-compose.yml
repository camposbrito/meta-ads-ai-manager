version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: meta_ads_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-meta_ads_db}
      MYSQL_USER: ${DB_USER:-meta_ads}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - meta_ads_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: meta_ads_backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: meta_ads
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: meta_ads_db
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - meta_ads_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: meta_ads_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - meta_ads_network

networks:
  meta_ads_network:
    driver: bridge

volumes:
  mysql_data:
